<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="640" height="360" fill="#08101c"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#1a2744" stroke-width="1" opacity="0.3">
    <line x1="0" y1="60" x2="640" y2="60"/>
    <line x1="0" y1="120" x2="640" y2="120"/>
    <line x1="0" y1="180" x2="640" y2="180"/>
    <line x1="0" y1="240" x2="640" y2="240"/>
    <line x1="0" y1="300" x2="640" y2="300"/>
    <line x1="80" y1="0" x2="80" y2="360"/>
    <line x1="160" y1="0" x2="160" y2="360"/>
    <line x1="240" y1="0" x2="240" y2="360"/>
    <line x1="320" y1="0" x2="320" y2="360"/>
    <line x1="400" y1="0" x2="400" y2="360"/>
    <line x1="480" y1="0" x2="480" y2="360"/>
    <line x1="560" y1="0" x2="560" y2="360"/>
  </g>

  <!-- Title -->
  <text x="320" y="28" text-anchor="middle" fill="#ffb35c" font-family="monospace" font-size="14" font-weight="bold">RADIUS — IAM Threat Detection Architecture</text>

  <!-- CloudTrail -->
  <rect x="40" y="75" width="100" y2="115" height="40" fill="#1a2744" stroke="#ffb35c" stroke-width="2"/>
  <text x="90" y="100" text-anchor="middle" fill="#e9eef7" font-family="monospace" font-size="11">CloudTrail</text>

  <!-- EventBridge -->
  <rect x="200" y="75" width="100" height="40" fill="#1a2744" stroke="#5aa7ff" stroke-width="2"/>
  <text x="250" y="95" text-anchor="middle" fill="#e9eef7" font-family="monospace" font-size="11">EventBridge</text>
  <text x="250" y="108" text-anchor="middle" fill="#a3b0c9" font-family="monospace" font-size="9">7 Detection Rules</text>

  <!-- Lambda Detector -->
  <rect x="360" y="75" width="100" height="40" fill="#1a2744" stroke="#ff6b6b" stroke-width="2"/>
  <text x="410" y="95" text-anchor="middle" fill="#e9eef7" font-family="monospace" font-size="11">Lambda</text>
  <text x="410" y="108" text-anchor="middle" fill="#a3b0c9" font-family="monospace" font-size="9">Detector</text>

  <!-- DynamoDB -->
  <rect x="520" y="75" width="80" height="40" fill="#1a2744" stroke="#4ecdc4" stroke-width="2"/>
  <text x="560" y="95" text-anchor="middle" fill="#e9eef7" font-family="monospace" font-size="11">DynamoDB</text>
  <text x="560" y="108" text-anchor="middle" fill="#a3b0c9" font-family="monospace" font-size="9">Blast Radius</text>

  <!-- Lambda Response -->
  <rect x="360" y="180" width="100" height="40" fill="#1a2744" stroke="#95e1d3" stroke-width="2"/>
  <text x="410" y="200" text-anchor="middle" fill="#e9eef7" font-family="monospace" font-size="11">Lambda</text>
  <text x="410" y="213" text-anchor="middle" fill="#a3b0c9" font-family="monospace" font-size="9">Response</text>

  <!-- IAM -->
  <rect x="200" y="180" width="100" height="40" fill="#1a2744" stroke="#dda0dd" stroke-width="2"/>
  <text x="250" y="200" text-anchor="middle" fill="#e9eef7" font-family="monospace" font-size="11">IAM</text>
  <text x="250" y="213" text-anchor="middle" fill="#a3b0c9" font-family="monospace" font-size="9">Disable User</text>

  <!-- SNS -->
  <rect x="40" y="180" width="100" height="40" fill="#1a2744" stroke="#ffb35c" stroke-width="2"/>
  <text x="90" y="200" text-anchor="middle" fill="#e9eef7" font-family="monospace" font-size="11">SNS</text>
  <text x="90" y="213" text-anchor="middle" fill="#a3b0c9" font-family="monospace" font-size="9">Alert</text>

  <!-- Arrows (pixel style) -->
  <g stroke="#4a5568" stroke-width="2" fill="none">
    <!-- CloudTrail → EventBridge -->
    <line x1="140" y1="95" x2="195" y2="95"/>
    <polygon points="195,90 205,95 195,100" fill="#4a5568"/>

    <!-- EventBridge → Lambda Detector -->
    <line x1="300" y1="95" x2="355" y2="95"/>
    <polygon points="355,90 365,95 355,100" fill="#4a5568"/>

    <!-- Lambda Detector → DynamoDB -->
    <line x1="460" y1="95" x2="515" y2="95"/>
    <polygon points="515,90 525,95 515,100" fill="#4a5568"/>

    <!-- DynamoDB → Lambda Response (down and back) -->
    <line x1="560" y1="115" x2="560" y2="150"/>
    <line x1="560" y1="150" x2="410" y2="150"/>
    <line x1="410" y1="150" x2="410" y2="175"/>
    <polygon points="405,175 410,185 415,175" fill="#4a5568"/>

    <!-- Lambda Response → IAM -->
    <line x1="360" y1="200" x2="305" y2="200"/>
    <polygon points="305,195 295,200 305,205" fill="#4a5568"/>

    <!-- Lambda Response → SNS -->
    <line x1="360" y1="200" x2="145" y2="200"/>
    <polygon points="145,195 135,200 145,205" fill="#4a5568"/>
  </g>

  <!-- Legend -->
  <rect x="40" y="280" width="560" height="60" fill="#0f1724" stroke="#2a3550" stroke-width="2"/>
  <text x="60" y="305" fill="#a3b0c9" font-family="monospace" font-size="10">FLOW:</text>
  <text x="60" y="320" fill="#a3b0c9" font-family="monospace" font-size="9">CloudTrail events → EventBridge rules → Lambda detection → DynamoDB scoring → Auto-response</text>

  <text x="400" y="305" fill="#a3b0c9" font-family="monospace" font-size="10">METRICS:</text>
  <text x="400" y="320" fill="#ffb35c" font-family="monospace" font-size="9">MTTD: &lt;5s</text>
  <text x="480" y="320" fill="#ffb35c" font-family="monospace" font-size="9">MTTR: ~30s</text>
  <text x="560" y="320" fill="#ffb35c" font-family="monospace" font-size="9">Coverage: 89%</text>
</svg>
