<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="640" height="360" fill="#08101c"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#1a2744" stroke-width="1" opacity="0.3">
    <line x1="0" y1="60" x2="640" y2="60"/>
    <line x1="0" y1="120" x2="640" y2="120"/>
    <line x1="0" y1="180" x2="640" y2="180"/>
    <line x1="0" y1="240" x2="640" y2="240"/>
    <line x1="0" y1="300" x2="640" y2="300"/>
    <line x1="80" y1="0" x2="80" y2="360"/>
    <line x1="160" y1="0" x2="160" y2="360"/>
    <line x1="240" y1="0" x2="240" y2="360"/>
    <line x1="320" y1="0" x2="320" y2="360"/>
    <line x1="400" y1="0" x2="400" y2="360"/>
    <line x1="480" y1="0" x2="480" y2="360"/>
    <line x1="560" y1="0" x2="560" y2="360"/>
  </g>

  <!-- Title -->
  <text x="320" y="28" text-anchor="middle" fill="#ffb35c" font-family="monospace" font-size="14" font-weight="bold">AnomAI — IAM Anomaly Detection Pipeline</text>

  <!-- CloudTrail -->
  <rect x="40" y="75" width="90" height="40" fill="#1a2744" stroke="#ffb35c" stroke-width="2"/>
  <text x="85" y="95" text-anchor="middle" fill="#e9eef7" font-family="monospace" font-size="10">CloudTrail</text>
  <text x="85" y="108" text-anchor="middle" fill="#a3b0c9" font-family="monospace" font-size="8">Events</text>

  <!-- S3 Bucket -->
  <rect x="160" y="75" width="90" height="40" fill="#1a2744" stroke="#5aa7ff" stroke-width="2"/>
  <text x="205" y="95" text-anchor="middle" fill="#e9eef7" font-family="monospace" font-size="10">S3 Bucket</text>
  <text x="205" y="108" text-anchor="middle" fill="#a3b0c9" font-family="monospace" font-size="8">Raw Logs</text>

  <!-- Lambda Analyzer -->
  <rect x="280" y="75" width="90" height="40" fill="#1a2744" stroke="#ff6b6b" stroke-width="2"/>
  <text x="325" y="95" text-anchor="middle" fill="#e9eef7" font-family="monospace" font-size="10">Lambda</text>
  <text x="325" y="108" text-anchor="middle" fill="#a3b0c9" font-family="monospace" font-size="8">6 Detectors</text>

  <!-- DynamoDB -->
  <rect x="400" y="75" width="90" height="40" fill="#1a2744" stroke="#4ecdc4" stroke-width="2"/>
  <text x="445" y="95" text-anchor="middle" fill="#e9eef7" font-family="monospace" font-size="10">DynamoDB</text>
  <text x="445" y="108" text-anchor="middle" fill="#a3b0c9" font-family="monospace" font-size="8">Incidents</text>

  <!-- Flask API -->
  <rect x="520" y="75" width="80" height="40" fill="#1a2744" stroke="#95e1d3" stroke-width="2"/>
  <text x="560" y="95" text-anchor="middle" fill="#e9eef7" font-family="monospace" font-size="10">Flask API</text>
  <text x="560" y="108" text-anchor="middle" fill="#a3b0c9" font-family="monospace" font-size="8">Backend</text>

  <!-- Dashboard -->
  <rect x="400" y="180" width="120" height="50" fill="#1a2744" stroke="#ffb35c" stroke-width="2"/>
  <text x="460" y="200" text-anchor="middle" fill="#e9eef7" font-family="monospace" font-size="11">Dashboard</text>
  <text x="460" y="215" text-anchor="middle" fill="#a3b0c9" font-family="monospace" font-size="9">SIEM-style UI</text>

  <!-- LLM Q&A -->
  <rect x="280" y="180" width="90" height="50" fill="#1a2744" stroke="#dda0dd" stroke-width="2"/>
  <text x="325" y="200" text-anchor="middle" fill="#e9eef7" font-family="monospace" font-size="10">LLM</text>
  <text x="325" y="215" text-anchor="middle" fill="#a3b0c9" font-family="monospace" font-size="9">Incident Q&amp;A</text>

  <!-- Detector badges -->
  <rect x="280" y="260" width="180" height="60" fill="#0f1724" stroke="#2a3550" stroke-width="2"/>
  <text x="370" y="280" text-anchor="middle" fill="#a3b0c9" font-family="monospace" font-size="9">6 Anomaly Detectors:</text>
  <text x="370" y="295" text-anchor="middle" fill="#5aa7ff" font-family="monospace" font-size="8">Unusual Hours | New Principal | Permission Creep</text>
  <text x="370" y="308" text-anchor="middle" fill="#5aa7ff" font-family="monospace" font-size="8">API Velocity | Geo Anomaly | Service Abuse</text>

  <!-- Arrows -->
  <g stroke="#4a5568" stroke-width="2" fill="none">
    <!-- CloudTrail → S3 -->
    <line x1="130" y1="95" x2="155" y2="95"/>
    <polygon points="155,90 165,95 155,100" fill="#4a5568"/>

    <!-- S3 → Lambda -->
    <line x1="250" y1="95" x2="275" y2="95"/>
    <polygon points="275,90 285,95 275,100" fill="#4a5568"/>

    <!-- Lambda → DynamoDB -->
    <line x1="370" y1="95" x2="395" y2="95"/>
    <polygon points="395,90 405,95 395,100" fill="#4a5568"/>

    <!-- DynamoDB → Flask -->
    <line x1="490" y1="95" x2="515" y2="95"/>
    <polygon points="515,90 525,95 515,100" fill="#4a5568"/>

    <!-- Flask → Dashboard (down) -->
    <line x1="560" y1="115" x2="560" y2="150"/>
    <line x1="560" y1="150" x2="460" y2="150"/>
    <line x1="460" y1="150" x2="460" y2="175"/>
    <polygon points="455,175 460,185 465,175" fill="#4a5568"/>

    <!-- Dashboard → LLM -->
    <line x1="400" y1="205" x2="375" y2="205"/>
    <polygon points="375,200 365,205 375,210" fill="#4a5568"/>
  </g>

  <!-- Metrics -->
  <rect x="40" y="260" width="200" height="60" fill="#0f1724" stroke="#2a3550" stroke-width="2"/>
  <text x="140" y="280" text-anchor="middle" fill="#a3b0c9" font-family="monospace" font-size="9">DETECTION RESULTS:</text>
  <text x="140" y="298" text-anchor="middle" fill="#ffb35c" font-family="monospace" font-size="10">16 incidents / 120 days</text>
  <text x="140" y="312" text-anchor="middle" fill="#a3b0c9" font-family="monospace" font-size="8">Across production AWS accounts</text>
</svg>
