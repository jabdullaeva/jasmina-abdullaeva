<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="640" height="360" fill="#08101c"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#1a2744" stroke-width="1" opacity="0.3">
    <line x1="0" y1="60" x2="640" y2="60"/>
    <line x1="0" y1="120" x2="640" y2="120"/>
    <line x1="0" y1="180" x2="640" y2="180"/>
    <line x1="0" y1="240" x2="640" y2="240"/>
    <line x1="0" y1="300" x2="640" y2="300"/>
    <line x1="80" y1="0" x2="80" y2="360"/>
    <line x1="160" y1="0" x2="160" y2="360"/>
    <line x1="240" y1="0" x2="240" y2="360"/>
    <line x1="320" y1="0" x2="320" y2="360"/>
    <line x1="400" y1="0" x2="400" y2="360"/>
    <line x1="480" y1="0" x2="480" y2="360"/>
    <line x1="560" y1="0" x2="560" y2="360"/>
  </g>

  <!-- Title -->
  <text x="320" y="28" text-anchor="middle" fill="#ffb35c" font-family="monospace" font-size="14" font-weight="bold">Security Group Auto-Remediation Pipeline</text>

  <!-- EC2 Security Group -->
  <rect x="40" y="75" width="100" height="40" fill="#1a2744" stroke="#ff6b6b" stroke-width="2"/>
  <text x="90" y="95" text-anchor="middle" fill="#e9eef7" font-family="monospace" font-size="10">EC2 Security</text>
  <text x="90" y="108" text-anchor="middle" fill="#a3b0c9" font-family="monospace" font-size="9">Group (Drift)</text>

  <!-- AWS Config Rule -->
  <rect x="180" y="75" width="110" height="40" fill="#1a2744" stroke="#5aa7ff" stroke-width="2"/>
  <text x="235" y="95" text-anchor="middle" fill="#e9eef7" font-family="monospace" font-size="10">AWS Config</text>
  <text x="235" y="108" text-anchor="middle" fill="#a3b0c9" font-family="monospace" font-size="9">Managed Rule</text>

  <!-- EventBridge -->
  <rect x="330" y="75" width="100" height="40" fill="#1a2744" stroke="#4a5568" stroke-width="2"/>
  <text x="380" y="95" text-anchor="middle" fill="#e9eef7" font-family="monospace" font-size="10">EventBridge</text>
  <text x="380" y="108" text-anchor="middle" fill="#a3b0c9" font-family="monospace" font-size="9">Config Change</text>

  <!-- Lambda Remediate -->
  <rect x="470" y="75" width="100" height="40" fill="#1a2744" stroke="#95e1d3" stroke-width="2"/>
  <text x="520" y="95" text-anchor="middle" fill="#e9eef7" font-family="monospace" font-size="10">Lambda</text>
  <text x="520" y="108" text-anchor="middle" fill="#a3b0c9" font-family="monospace" font-size="9">Remediate</text>

  <!-- Approved Rules Store -->
  <rect x="470" y="150" width="100" height="40" fill="#1a2744" stroke="#4ecdc4" stroke-width="2"/>
  <text x="520" y="170" text-anchor="middle" fill="#e9eef7" font-family="monospace" font-size="10">SSM Parameter</text>
  <text x="520" y="183" text-anchor="middle" fill="#a3b0c9" font-family="monospace" font-size="9">Approved Rules</text>

  <!-- SNS Notification -->
  <rect x="280" y="150" width="100" height="40" fill="#1a2744" stroke="#ffb35c" stroke-width="2"/>
  <text x="330" y="170" text-anchor="middle" fill="#e9eef7" font-family="monospace" font-size="10">SNS</text>
  <text x="330" y="183" text-anchor="middle" fill="#a3b0c9" font-family="monospace" font-size="9">Alert</text>

  <!-- CloudWatch Dashboard -->
  <rect x="140" y="150" width="100" height="40" fill="#1a2744" stroke="#dda0dd" stroke-width="2"/>
  <text x="190" y="170" text-anchor="middle" fill="#e9eef7" font-family="monospace" font-size="10">CloudWatch</text>
  <text x="190" y="183" text-anchor="middle" fill="#a3b0c9" font-family="monospace" font-size="9">Dashboard</text>

  <!-- Arrows -->
  <g stroke="#4a5568" stroke-width="2" fill="none">
    <!-- Config → EventBridge -->
    <line x1="290" y1="95" x2="325" y2="95"/>
    <polygon points="325,90 335,95 325,100" fill="#4a5568"/>

    <!-- EventBridge → Lambda -->
    <line x1="430" y1="95" x2="465" y2="95"/>
    <polygon points="465,90 475,95 465,100" fill="#4a5568"/>

    <!-- Lambda ← SSM (up from below) -->
    <line x1="520" y1="150" x2="520" y2="120"/>
    <polygon points="515,120 520,110 525,120" fill="#4a5568"/>

    <!-- Lambda → SNS (down and left) -->
    <line x1="470" y1="100" x2="470" y2="130"/>
    <line x1="470" y1="130" x2="385" y2="130"/>
    <line x1="385" y1="130" x2="385" y2="145"/>
    <polygon points="380,145 385,155 390,145" fill="#4a5568"/>

    <!-- Lambda → Security Group (remediate - feedback loop) -->
    <line x1="470" y1="90" x2="450" y2="90"/>
    <line x1="450" y1="90" x2="450" y2="50"/>
    <line x1="450" y1="50" x2="140" y2="50"/>
    <line x1="140" y1="50" x2="140" y2="70"/>
    <polygon points="135,70 140,80 145,70" fill="#4a5568"/>

    <!-- Lambda → CloudWatch -->
    <line x1="470" y1="105" x2="400" y2="105"/>
    <line x1="400" y1="105" x2="400" y2="130"/>
    <line x1="400" y1="130" x2="245" y2="130"/>
    <line x1="245" y1="130" x2="245" y2="145"/>
    <polygon points="240,145 245,155 250,145" fill="#4a5568"/>
  </g>

  <!-- Metrics box -->
  <rect x="40" y="260" width="560" height="70" fill="#0f1724" stroke="#2a3550" stroke-width="2"/>
  <text x="320" y="282" text-anchor="middle" fill="#a3b0c9" font-family="monospace" font-size="10">REMEDIATION PERFORMANCE:</text>
  <text x="180" y="305" text-anchor="middle" fill="#ffb35c" font-family="monospace" font-size="12">MTTD: &lt;1 second</text>
  <text x="320" y="305" text-anchor="middle" fill="#ffb35c" font-family="monospace" font-size="12">MTTR: ~4 seconds</text>
  <text x="460" y="305" text-anchor="middle" fill="#ffb35c" font-family="monospace" font-size="12">100% Automated</text>
  <text x="320" y="322" text-anchor="middle" fill="#a3b0c9" font-family="monospace" font-size="9">Zero manual intervention required after deployment</text>
</svg>
