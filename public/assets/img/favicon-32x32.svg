<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="32" height="32" fill="#0b1220"/>

  <!-- Cloud (blue) -->
  <rect x="6" y="12" width="10" height="7" fill="#1a2744" stroke="#5aa7ff" stroke-width="1"/>
  <rect x="8" y="10" width="6" height="4" fill="#1a2744" stroke="#5aa7ff" stroke-width="1"/>
  <rect x="12" y="11" width="5" height="5" fill="#1a2744" stroke="#5aa7ff" stroke-width="1"/>

  <!-- Shield (amber) -->
  <rect x="19" y="11" width="6" height="9" fill="#1a2744" stroke="#ffb35c" stroke-width="1"/>
  <rect x="20" y="12" width="4" height="7" fill="#ffb35c" opacity="0.3"/>

  <!-- Circuit node (teal) -->
  <rect x="14" y="22" width="4" height="4" fill="#1a2744" stroke="#4ecdc4" stroke-width="1"/>
  <line x1="16" y1="20" x2="16" y2="22" stroke="#4ecdc4" stroke-width="1"/>
</svg>
